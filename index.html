<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BG Remover — background removal &amp; image upscaling</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0d12;--s:#12151d;--s2:#171b25;--s3:#1f2430;--b:#262c3a;--b2:#333b4e;--a:#6d7dff;--a2:#22d3ee;--t:#e8eaf0;--m:#8a91a5;--g:#34d399}
body{font-family:Inter,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px 64px;background-image:radial-gradient(ellipse 55% 35% at 50% -5%,rgba(109,125,255,.08),transparent 70%);position:relative}
#bgfx{position:fixed;inset:0;z-index:-1;display:block}
.top{width:100%;max-width:920px;display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.02rem;letter-spacing:-.01em}
.brand-mark{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--a),#4338ca);color:#fff;font-size:.95rem}
.lang{display:flex;gap:2px;background:var(--s);border:1px solid var(--b);border-radius:9px;padding:3px}
.lang button{border:none;background:none;color:var(--m);font:inherit;font-size:.78rem;font-weight:600;padding:5px 13px;border-radius:6px;cursor:pointer;transition:color .15s,background .15s}
.lang button:hover{color:var(--t)}
.lang button.on{background:var(--s3);color:var(--t)}
.lang button:focus-visible{outline:2px solid var(--a);outline-offset:1px}
header{text-align:center;margin-bottom:36px;max-width:640px}
header h1{font-size:1.7rem;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
header p{color:var(--m);font-size:.95rem;line-height:1.6}
.tabs{display:flex;gap:4px;width:100%;max-width:920px;border-bottom:1px solid var(--b);margin-bottom:22px}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--m);padding:11px 18px;font:inherit;font-size:.93rem;font-weight:600;cursor:pointer;transition:color .15s,border-color .15s;margin-bottom:-1px}
.tab:hover{color:var(--t)}
.tab.on{color:var(--t);border-bottom-color:var(--a)}
.tab:focus-visible{outline:2px solid var(--a);outline-offset:-2px}
.card{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:28px;width:100%;max-width:920px;box-shadow:0 10px 32px rgba(0,0,0,.35)}
.opts{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.opt-label{color:var(--m);font-size:.88rem;font-weight:600}
.dd{position:relative;flex:1;min-width:260px;max-width:460px}
.dd-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:10px 14px;color:var(--t);font:inherit;font-size:.9rem;cursor:pointer;transition:border-color .15s}
.dd-btn:hover{border-color:var(--b2)}
.dd-btn:focus-visible{outline:2px solid var(--a);outline-offset:1px}
.dd-btn:disabled{opacity:.55;cursor:not-allowed}
.dd.open .dd-btn{border-color:var(--a)}
.dd-cur{display:flex;align-items:center;gap:8px;min-width:0}
.dd-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-badge{flex-shrink:0;font-size:.7rem;font-weight:600;color:var(--m);background:var(--s3);border:1px solid var(--b);border-radius:5px;padding:2px 7px}
.dd-chev{color:var(--m);font-size:.68rem;transition:transform .15s;flex-shrink:0}
.dd.open .dd-chev{transform:rotate(180deg)}
.dd-list{position:absolute;z-index:40;top:calc(100% + 6px);left:0;right:0;background:var(--s2);border:1px solid var(--b);border-radius:12px;padding:5px;list-style:none;box-shadow:0 18px 48px rgba(0,0,0,.55);display:none;max-height:340px;overflow:auto}
.dd.open .dd-list{display:block}
.dd-opt{padding:9px 11px;border-radius:8px;cursor:pointer}
.dd-opt:hover{background:var(--s3)}
.dd-opt[aria-selected="true"]{background:rgba(109,125,255,.10)}
.dd-orow{display:flex;align-items:center;gap:8px}
.dd-orow .dd-name{font-size:.88rem;flex:1}
.dd-check{color:var(--a);font-size:.8rem;flex-shrink:0}
.dd-odesc{margin-top:2px;font-size:.78rem;color:var(--m);line-height:1.45}
#dz,#udz{border:1.5px dashed var(--b2);border-radius:12px;padding:52px 32px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative;user-select:none}
#dz:hover,#dz.ov,#udz:hover,#udz.ov{border-color:var(--a);background:rgba(109,125,255,.05)}
#dz:focus-within,#udz:focus-within{outline:2px solid var(--a);outline-offset:3px}
#dz input,#udz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.di{color:var(--m);margin-bottom:14px}
.dt{font-size:1.02rem;font-weight:600;margin-bottom:8px;max-width:540px;margin-left:auto;margin-right:auto}
.ds{color:var(--m);font-size:.85rem;line-height:1.7}
.browse{display:inline-block;margin-top:16px;border:1px solid var(--b2);background:var(--s3);color:var(--t);border-radius:9px;padding:9px 22px;font-weight:600;font-size:.88rem;pointer-events:none}
#pw,#upw{display:none;margin-top:22px}
.pt{display:flex;justify-content:space-between;gap:12px;margin-bottom:10px}
.pl{font-size:.86rem;color:var(--m)}
.pp{font-size:.86rem;font-weight:700;color:var(--a);font-variant-numeric:tabular-nums}
.ptrack{background:var(--s2);border-radius:999px;height:8px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:999px;transition:width .35s;width:0%}
.pstep{display:flex;gap:22px;flex-wrap:wrap;margin-top:16px}
.step{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--m);transition:color .2s}
.step.ac{color:var(--t)}
.step.dn{color:var(--g)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--b2);flex-shrink:0;transition:background .2s}
.step.ac .dot{background:var(--a)}
.step.dn .dot{background:var(--g)}
#rw,#urw{display:none;margin-top:22px}
.sb{display:inline-flex;align-items:center;gap:7px;background:rgba(52,211,153,.1);color:var(--g);border:1px solid rgba(52,211,153,.25);border-radius:999px;padding:5px 14px;font-size:.8rem;font-weight:600;margin-bottom:16px}
.imgs{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
@media(max-width:640px){.imgs{grid-template-columns:1fr}.card{padding:18px}#dz,#udz{padding:40px 16px}.top{margin-bottom:28px}}
.ic{border-radius:10px;overflow:hidden;border:1px solid var(--b);background:var(--s2)}
.il{padding:8px 13px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--m);border-bottom:1px solid var(--b)}
.ic img{width:100%;display:block;max-height:380px;object-fit:contain}
.ck img{background:repeating-conic-gradient(#1c212c 0% 25%,#12151d 0% 50%) 0 0/20px 20px}
.ac2{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:9px;font-size:.9rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:background .15s,border-color .15s,color .15s;white-space:nowrap;min-height:42px;font-family:inherit}
.btn:focus-visible{outline:2px solid var(--a2);outline-offset:2px}
.bp{background:var(--a);color:#fff}
.bp:hover{background:#5b6cf2}
.bs{background:var(--s3);color:var(--t);border-color:var(--b2)}
.bs:hover{border-color:var(--a2)}
.bg2{background:none;color:var(--m);border-color:var(--b)}
.bg2:hover{color:var(--t);border-color:var(--b2)}
#eb,#ueb{display:none;margin-top:16px;background:rgba(248,113,113,.08);color:#fca5a5;border:1px solid rgba(248,113,113,.25);border-radius:10px;padding:12px 16px;font-size:.86rem;white-space:pre-wrap;line-height:1.55}
footer{margin-top:36px;color:var(--m);font-size:.78rem;text-align:center;line-height:1.9}
footer a{color:#9fb0ff;text-decoration:none}
footer a:hover{text-decoration:underline}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<canvas id="bgfx" aria-hidden="true"></canvas>
<div class="top">
<div class="brand"><span class="brand-mark" aria-hidden="true">✂</span><span>BG Remover</span></div>

<div class="step" id="s2"><div class="dot"></div><span data-i18n="s2"></span></div>
</div>
</div>
<div id="rw">
<div class="sb" data-i18n="ok_bg"></div>
<div class="imgs">
<div class="ic"><div class="il" data-i18n="lbl_orig"></div><img id="oi" src="" alt="Original image"/></div>
<div class="ic ck"><div class="il" data-i18n="lbl_result"></div><img id="ri" src="" alt="Result image"/></div>
</div>
<div class="ac2">
<button class="btn bp" id="d1" data-i18n="btn_png"></button>
<button class="btn bs" id="d2" data-i18n="btn_webp"></button>
<button class="btn bg2" id="dr" data-i18n="btn_new"></button>
</div>
</div>
</main>
<section class="card" id="panel-up" style="display:none">
<div class="opts">
<span class="opt-label" data-i18n="lbl_mode"></span>
<div class="dd" id="dd-up"></div>
</div>
<div id="udz">
<input type="file" id="ufi" accept="image/*"/>
<div class="di" aria-hidden="true"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6M11 8v6"/></svg></div>
<div class="dt" data-i18n="dz_title"></div>
<div class="ds"><span data-i18n="hint_up"></span><br/><span data-i18n="hint_up2"></span><br/><span class="browse" data-i18n="browse"></span></div>
</div>
<div id="ueb" role="alert"></div>
<div id="upw">
<div class="pt"><span class="pl" id="upl">…</span><span class="pp" id="upp">0%</span></div>
<div class="ptrack"><div class="pfill" id="upf"></div></div>
</div>
<div id="urw">
<div class="sb" data-i18n="ok_up"></div>
<div class="imgs">
<div class="ic"><div class="il" id="uol"></div><img id="uoi" src="" alt="Original image"/></div>
<div class="ic"><div class="il" id="uil"></div><img id="uri" src="" alt="Upscaled image"/></div>
</div>
<div class="ac2">
<button class="btn bp" id="ud1" data-i18n="btn_png"></button>
<button class="btn bg2" id="udr" data-i18n="btn_new"></button>
</div>
</div>
</section>
<footer><span data-i18n="footer1"></span><br/><span data-i18n="footer2"></span> <a href="https://github.com/imgly/background-removal-js" target="_blank" rel="noopener">@imgly/background-removal</a> · <a href="https://huggingface.co/briaai/RMBG-1.4" target="_blank" rel="noopener">RMBG-1.4</a> · <a href="https://github.com/mv-lab/swin2sr" target="_blank" rel="noopener">Swin2SR</a></footer>

    else if (d.type === 'error') { const j = activeJob; activeJob = null; j.reject(d); }

  busy = true;
  ddBg.disabled = true;
  eb.style.display = 'none'; dz.style.display = 'none'; rw.style.display = 'none'; pw.style.display = 'block';
  baseName = file.name ? file.name.replace(/\.[^.]+$/, '') : 'image';
  setImage(oi, file);
  setStep(0); progress(t('w_engine'), 3);
  try {
    const result = await runJob({ task: 'removeBg', file, model: ddBg.value }, (label, pct) => {
      if (label.k === 'infer') setStep(1);
      progress(workerLabel(label), pct);
    });
    resultBlob = result.blob;
    setImage(ri, resultBlob);
    progress(t('p_done'), 100); setStep(2);
    setTimeout(() => { pw.style.display = 'none'; rw.style.display = 'block'; }, 450);
  } catch (d) {
    pw.style.display = 'none'; dz.style.display = 'block';
    showError(workerError(d));
  } finally {
    busy = false;
    ddBg.disabled = false;
  }
}

function progress(text, pct) { pl.textContent = text; pp.textContent = pct + '%'; pf.style.width = pct + '%'; }
function setStep(n) { [0, 1, 2].forEach(i => { document.getElementById('s' + i).className = 'step' + (i < n ? ' dn' : i === n ? ' ac' : ''); }); }
function showError(msg) { eb.style.display = 'block'; eb.textContent = msg; }

// ---------- Upscale tab ----------
const udz = document.getElementById('udz'), ufi = document.getElementById('ufi');
const upw = document.getElementById('upw'), upl = document.getElementById('upl');
const upp = document.getElementById('upp'), upf = document.getElementById('upf');
const ueb = document.getElementById('ueb'), urw = document.getElementById('urw');
const uoi = document.getElementById('uoi'), uri = document.getElementById('uri');
const uol = document.getElementById('uol'), uil = document.getElementById('uil');
let upBusy = false, upBlob = null, upName = 'image';
let uolDims = null, uilInfo = null;

function setUpLabels() {
  uol.textContent = t('lbl_orig') + (uolDims ? ' \u00b7 ' + uolDims : '');
  uil.textContent = uilInfo ? t('lbl_up', { s: uilInfo.s }) + ' \u00b7 ' + uilInfo.w + '\u00d7' + uilInfo.h : t('lbl_up', { s: '2' });
}

let upDragDepth = 0;
udz.addEventListener('dragenter', e => { e.preventDefault(); upDragDepth++; udz.classList.add('ov'); });
udz.addEventListener('dragover', e => e.preventDefault());
udz.addEventListener('dragleave', () => { if (--upDragDepth <= 0) { upDragDepth = 0; udz.classList.remove('ov'); } });
udz.addEventListener('drop', e => {
  e.preventDefault(); upDragDepth = 0; udz.classList.remove('ov');
  handleUpFile(e.dataTransfer.files[0]);
});
ufi.addEventListener('change', e => handleUpFile(e.target.files[0]));

document.getElementById('udr').addEventListener('click', () => {
  urw.style.display = 'none'; upw.style.display = 'none'; udz.style.display = 'block';
  ueb.style.display = 'none'; ufi.value = ''; upBlob = null;
});
document.getElementById('ud1').addEventListener('click', () => {
  if (!upBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(upBlob);
  a.download = upName + '-upscaled.png';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
});

function handleUpFile(file) {
  if (upBusy || !file) return;
  if (!file.type.startsWith('image/')) return showUpError(t('err_type'));
  if (file.size > MAX_SIZE) return showUpError(t('err_size', { s: (file.size / 1048576).toFixed(1) }));
  upscale(file);
}

async function upscale(file) {
  upBusy = true;
  ddUp.disabled = true;
  ueb.style.display = 'none'; udz.style.display = 'none'; urw.style.display = 'none'; upw.style.display = 'block';
  upName = file.name ? file.name.replace(/\.[^.]+$/, '') : 'image';
  try {
    upProgress(t('p_read'), 2);
    const modelId = ddUp.value;
    const scale = modelId.includes('x4') ? 4 : 2;
    const maxPx = scale === 4 ? UP_MAX_X4 : UP_MAX_X2;
    // Pre-flight dimension check on the main thread (the worker re-checks too)
    let w = 0, h = 0;
    try { const bmp = await createImageBitmap(file); w = bmp.width; h = bmp.height; bmp.close(); } catch (_) { /* let the worker validate */ }
    if (w * h > maxPx) throw { code: 'too_large', info: { w, h, scale, maxPx } };
    setImage(uoi, file);
    uolDims = (w && h) ? w + '\u00d7' + h : null;
    uilInfo = null;
    setUpLabels();
    const result = await runJob({ task: 'upscale', file, modelId }, (label, pct) => upProgress(workerLabel(label), pct));
    upBlob = result.blob;
    setImage(uri, upBlob);
    uilInfo = { s: result.scale, w: result.width, h: result.height };
    setUpLabels();
    upProgress(t('p_done'), 100);
    setTimeout(() => { upw.style.display = 'none'; urw.style.display = 'block'; }, 450);
  } catch (d) {
    upw.style.display = 'none'; udz.style.display = 'block';
    showUpError(workerError(d));
  } finally {
    upBusy = false;
    ddUp.disabled = false;
  }
}

function upProgress(text, pct) { upl.textContent = text; upp.textContent = pct + '%'; upf.style.width = pct + '%'; }
function showUpError(msg) { ueb.style.display = 'block'; ueb.textContent = msg; }

applyLang();

// ---------- Interactive particle background ----------
// Lightweight canvas constellation: dots drift slowly, nearby dots link with
// faint lines, and lines also reach toward the cursor. Purely decorative —
// pointer-events are left on the canvas's default (it sits behind everything
// via z-index, so it never blocks clicks) and it fully respects prefers-reduced-motion.
(function () {
  const canvas = document.getElementById('bgfx');
  if (!canvas || !canvas.getContext) return;
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ctx = canvas.getContext('2d');
  let w = 0, h = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
  let particles = [];
  let raf = null;
  const mouse = { x: -9999, y: -9999 };
  const AREA_PER_DOT = 15000; // one particle per this many CSS px²
  const LINK_DIST = 130;
  const MOUSE_DIST = 170;

  function resize() {
    w = window.innerWidth; h = window.innerHeight;
    canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const count = reduceMotion ? 0 : Math.min(150, Math.max(35, Math.round((w * h) / AREA_PER_DOT)));
    particles = Array.from({ length: count }, () => ({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.24, vy: (Math.random() - 0.5) * 0.24
    }));
  }

  function frame() {
    ctx.clearRect(0, 0, w, h);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    }
    for (let i = 0; i < particles.length; i++) {
      const a = particles[i];
      for (let j = i + 1; j < particles.length; j++) {
        const b = particles[j];
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < LINK_DIST) {
          ctx.strokeStyle = 'rgba(109,125,255,' + (0.16 * (1 - d / LINK_DIST)) + ')';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      }
      const dm = Math.hypot(a.x - mouse.x, a.y - mouse.y);
      if (dm < MOUSE_DIST) {
        ctx.strokeStyle = 'rgba(34,211,238,' + (0.4 * (1 - dm / MOUSE_DIST)) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
      }
      ctx.fillStyle = 'rgba(143,153,255,.55)';
      ctx.beginPath(); ctx.arc(a.x, a.y, 1.6, 0, Math.PI * 2); ctx.fill();
    }
    if (particles.length) raf = requestAnimationFrame(frame);
  }

  function start() { if (raf) cancelAnimationFrame(raf); resize(); frame(); }
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
  window.addEventListener('resize', start);
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { if (raf) cancelAnimationFrame(raf); }
    else start();
  });
  start();
})();
</script>
</body>
